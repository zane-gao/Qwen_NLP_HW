<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880" role="img" aria-label="Qwen technical timeline from 2023 to 2026">
  <defs>
    <style>
      .bg{fill:#f8fafc}.axis{stroke:#111827;stroke-width:3}.tick{stroke:#111827;stroke-width:2}.year{font:700 30px Arial,sans-serif;fill:#111827}.label{font:700 21px Arial,sans-serif;fill:#111827}.small{font:15px Arial,sans-serif;fill:#374151}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.main{fill:#eef2ff;stroke:#6366f1}.branch{fill:#ecfeff;stroke:#0891b2}.reason{fill:#fff7ed;stroke:#f97316}.multi{fill:#f0fdf4;stroke:#16a34a}.latest{fill:#fdf2f8;stroke:#db2777}.line{stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 7}.tag{font:700 13px Arial,sans-serif;fill:#111827}
    </style>
  </defs>
  <rect class="bg" width="1500" height="880"/>
  <text x="70" y="70" class="year">Qwen 系列技术路线时间线</text>
  <text x="70" y="103" class="small">主线模型、推理模型与多模态/专用分支在同一时间轴上的演进。自制图，基于官方博客、GitHub 与 arXiv 资料整理。</text>
  <line x1="120" y1="190" x2="1390" y2="190" class="axis"/>
  <g>
    <line x1="180" y1="174" x2="180" y2="206" class="tick"/><text x="150" y="155" class="year">2023</text>
    <line x1="530" y1="174" x2="530" y2="206" class="tick"/><text x="500" y="155" class="year">2024</text>
    <line x1="920" y1="174" x2="920" y2="206" class="tick"/><text x="890" y="155" class="year">2025</text>
    <line x1="1265" y1="174" x2="1265" y2="206" class="tick"/><text x="1235" y="155" class="year">2026</text>
  </g>
  <g>
    <rect x="95" y="245" width="235" height="125" class="card main"/><text x="118" y="282" class="label">Qwen 初代</text><text x="118" y="313" class="small">1.8B/7B/14B/72B</text><text x="118" y="340" class="small">3T 多语料、Chat/RLHF、工具调用</text>
    <rect x="390" y="245" width="245" height="125" class="card main"/><text x="415" y="282" class="label">Qwen1.5</text><text x="415" y="313" class="small">0.5B-110B + MoE</text><text x="415" y="340" class="small">32K、HF 原生、量化生态</text>
    <rect x="655" y="245" width="250" height="125" class="card main"/><text x="680" y="282" class="label">Qwen2</text><text x="680" y="313" class="small">0.5B/1.5B/7B/72B + 57B-A14B</text><text x="680" y="340" class="small">GQA、7T、最高 128K</text>
    <rect x="930" y="245" width="260" height="125" class="card main"/><text x="955" y="282" class="label">Qwen2.5</text><text x="955" y="313" class="small">0.5B-72B + Coder/Math/VL/Omni</text><text x="955" y="340" class="small">18T、结构化输出、长文本生成</text>
    <rect x="1220" y="245" width="250" height="125" class="card latest"/><text x="1245" y="282" class="label">Qwen3.5 / 3.6</text><text x="1245" y="313" class="small">Native multimodal agents</text><text x="1245" y="340" class="small">201 语言、Hybrid/MoE、coding 稳定性</text>
  </g>
  <g>
    <rect x="180" y="445" width="230" height="115" class="card branch"/><text x="205" y="482" class="label">Qwen-VL / Audio</text><text x="205" y="512" class="small">视觉读图、OCR、音频理解</text><text x="205" y="538" class="small">从 LLM 扩展到感知接口</text>
    <rect x="485" y="445" width="230" height="115" class="card branch"/><text x="510" y="482" class="label">Coder / Math</text><text x="510" y="512" class="small">代码继续预训练、FIM</text><text x="510" y="538" class="small">CoT/TIR/RM 自改进</text>
    <rect x="785" y="445" width="230" height="115" class="card reason"/><text x="810" y="482" class="label">QwQ / QVQ</text><text x="810" y="512" class="small">长 CoT、RL 推理扩展</text><text x="810" y="538" class="small">视觉推理预研</text>
    <rect x="1085" y="445" width="230" height="115" class="card multi"/><text x="1110" y="482" class="label">Qwen2.5-Omni</text><text x="1110" y="512" class="small">Thinker-Talker</text><text x="1110" y="538" class="small">文本/图像/音频/视频到语音</text>
  </g>
  <g>
    <rect x="670" y="635" width="250" height="115" class="card reason"/><text x="695" y="672" class="label">Qwen3</text><text x="695" y="702" class="small">Dense + MoE</text><text x="695" y="728" class="small">thinking / non-thinking 统一</text>
    <rect x="955" y="635" width="255" height="115" class="card reason"/><text x="980" y="672" class="label">Qwen3-Next</text><text x="980" y="702" class="small">Gated DeltaNet + Attention</text><text x="980" y="728" class="small">80B 总量、约 3B 激活</text>
    <rect x="1240" y="635" width="250" height="115" class="card multi"/><text x="1265" y="672" class="label">Qwen3-VL / Omni / VLA</text><text x="1265" y="702" class="small">视觉 agent、实时 omni</text><text x="1265" y="728" class="small">机器人动作与轨迹预测</text>
  </g>
  <line x1="210" y1="370" x2="260" y2="445" class="line"/>
  <line x1="560" y1="370" x2="595" y2="445" class="line"/>
  <line x1="995" y1="370" x2="900" y2="445" class="line"/>
  <line x1="1070" y1="370" x2="1160" y2="445" class="line"/>
  <line x1="1045" y1="370" x2="790" y2="635" class="line"/>
  <line x1="1345" y1="370" x2="1090" y2="635" class="line"/>
  <line x1="1345" y1="370" x2="1350" y2="635" class="line"/>
  <g>
    <rect x="72" y="795" width="16" height="16" class="main"/><text x="98" y="809" class="tag">通用 LLM 主线</text>
    <rect x="245" y="795" width="16" height="16" class="branch"/><text x="271" y="809" class="tag">专用/多模态分支</text>
    <rect x="445" y="795" width="16" height="16" class="reason"/><text x="471" y="809" class="tag">显式推理与效率架构</text>
    <rect x="675" y="795" width="16" height="16" class="latest"/><text x="701" y="809" class="tag">2026 最新主线</text>
  </g>
</svg>
