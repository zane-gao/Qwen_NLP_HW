<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-label="Qwen architecture evolution">
  <defs>
    <style>
      .bg{fill:#ffffff}.title{font:700 34px Arial,sans-serif;fill:#111827}.sub{font:16px Arial,sans-serif;fill:#475569}.stage{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2;rx:20}.box{fill:#ffffff;stroke:#64748b;stroke-width:2;rx:14}.box2{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:14}.box3{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:14}.box4{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:14}.box5{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:14}.text{font:700 20px Arial,sans-serif;fill:#111827}.small{font:15px Arial,sans-serif;fill:#334155}.arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:2;stroke-dasharray:8 7}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1500" height="920"/>
  <text x="70" y="70" class="title">Qwen 架构演进：从 Dense Transformer 到原生多模态 Agent</text>
  <text x="70" y="103" class="sub">自制解释图：抽象呈现各代关键结构变化，不代表官方完整网络拓扑。</text>
  <g>
    <rect x="70" y="160" width="260" height="630" class="stage"/>
    <text x="100" y="205" class="text">Qwen / Qwen1.5</text>
    <rect x="105" y="245" width="190" height="58" class="box"/><text x="128" y="280" class="small">Token Embedding</text>
    <rect x="105" y="325" width="190" height="70" class="box2"/><text x="135" y="354" class="small">Decoder Block</text><text x="127" y="377" class="small">RoPE + RMSNorm</text>
    <rect x="105" y="415" width="190" height="70" class="box2"/><text x="138" y="444" class="small">SwiGLU FFN</text><text x="132" y="467" class="small">Dense 参数路径</text>
    <rect x="105" y="505" width="190" height="70" class="box4"/><text x="130" y="534" class="small">SFT / RLHF</text><text x="122" y="557" class="small">Chat 与工具调用</text>
    <rect x="105" y="595" width="190" height="90" class="box5"/><text x="124" y="625" class="small">工程重点</text><text x="122" y="650" class="small">HF / GPTQ / AWQ</text><text x="128" y="674" class="small">vLLM / llama.cpp</text>
  </g>
  <g>
    <rect x="390" y="160" width="260" height="630" class="stage"/>
    <text x="420" y="205" class="text">Qwen2 / Qwen2.5</text>
    <rect x="425" y="245" width="190" height="58" class="box"/><text x="447" y="280" class="small">151K BPE 词表</text>
    <rect x="425" y="325" width="190" height="70" class="box3"/><text x="469" y="354" class="small">GQA</text><text x="441" y="377" class="small">KV cache 降成本</text>
    <rect x="425" y="415" width="190" height="70" class="box5"/><text x="449" y="444" class="small">Long Context</text><text x="456" y="467" class="small">128K / YaRN</text>
    <rect x="425" y="505" width="190" height="70" class="box4"/><text x="449" y="534" class="small">数据扩展</text><text x="447" y="557" class="small">7T -> 18T</text>
    <rect x="425" y="595" width="190" height="90" class="box2"/><text x="447" y="625" class="small">能力专项化</text><text x="439" y="650" class="small">Coder / Math</text><text x="432" y="674" class="small">VL / Audio / Omni</text>
  </g>
  <g>
    <rect x="710" y="160" width="260" height="630" class="stage"/>
    <text x="740" y="205" class="text">QwQ / Qwen3</text>
    <rect x="745" y="245" width="190" height="58" class="box"/><text x="779" y="280" class="small">Dense + MoE</text>
    <rect x="745" y="325" width="190" height="70" class="box5"/><text x="769" y="354" class="small">Thinking Mode</text><text x="766" y="377" class="small">长 CoT / budget</text>
    <rect x="745" y="415" width="190" height="70" class="box5"/><text x="760" y="444" class="small">Non-thinking</text><text x="768" y="467" class="small">低延迟响应</text>
    <rect x="745" y="505" width="190" height="70" class="box4"/><text x="767" y="534" class="small">四阶段后训练</text><text x="770" y="557" class="small">SFT + RL 融合</text>
    <rect x="745" y="595" width="190" height="90" class="box3"/><text x="767" y="625" class="small">Agentic 能力</text><text x="763" y="650" class="small">工具调用 / MCP</text><text x="772" y="674" class="small">多语 119 种</text>
  </g>
  <g>
    <rect x="1030" y="160" width="260" height="630" class="stage"/>
    <text x="1060" y="205" class="text">Qwen3-Next / 3.5 / 3.6</text>
    <rect x="1065" y="245" width="190" height="58" class="box3"/><text x="1088" y="280" class="small">Gated DeltaNet</text>
    <rect x="1065" y="325" width="190" height="70" class="box3"/><text x="1092" y="354" class="small">Hybrid Attention</text><text x="1094" y="377" class="small">长序列高吞吐</text>
    <rect x="1065" y="415" width="190" height="70" class="box2"/><text x="1087" y="444" class="small">Ultra-sparse MoE</text><text x="1094" y="467" class="small">少量激活参数</text>
    <rect x="1065" y="505" width="190" height="70" class="box4"/><text x="1083" y="534" class="small">Native VL Agents</text><text x="1091" y="557" class="small">早融合多模态</text>
    <rect x="1065" y="595" width="190" height="90" class="box5"/><text x="1085" y="625" class="small">真实开发体验</text><text x="1085" y="650" class="small">Coding 稳定性</text><text x="1086" y="674" class="small">thinking 保留</text>
  </g>
  <g>
    <rect x="595" y="820" width="310" height="56" class="box4"/><text x="626" y="854" class="small">Omni: Thinker-Talker + TMRoPE</text>
    <rect x="955" y="820" width="310" height="56" class="box4"/><text x="982" y="854" class="small">VLA: VLM backbone + DiT action decoder</text>
    <line x1="840" y1="790" x2="745" y2="820" class="dash"/>
    <line x1="1160" y1="790" x2="1110" y2="820" class="dash"/>
  </g>
  <line x1="330" y1="465" x2="390" y2="465" class="arrow"/>
  <line x1="650" y1="465" x2="710" y2="465" class="arrow"/>
  <line x1="970" y1="465" x2="1030" y2="465" class="arrow"/>
</svg>
